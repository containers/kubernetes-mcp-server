kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "start-tekton-task"
  difficulty: medium
  labels:
    suite: tekton
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true
    - script:
        inline: |-
          #!/usr/bin/env bash
          for i in $(seq 1 60); do
            if ! kubectl get namespace tekton-eval > /dev/null 2>&1; then
              echo "Namespace tekton-eval is gone"
              exit 0
            fi
            for tr in $(kubectl get taskrun -n tekton-eval -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl patch taskrun -n tekton-eval "$tr" --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
            done
            for pr in $(kubectl get pipelinerun -n tekton-eval -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl patch pipelinerun -n tekton-eval "$pr" --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
            done
            sleep 3
          done
          echo "Timeout waiting for namespace deletion"
          exit 1
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: echo-task
          namespace: tekton-eval
        spec:
          steps:
            - name: echo
              image: alpine
              command: ["echo", "Hello, Tekton!"]

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          COUNT=$(kubectl get taskrun -n tekton-eval \
            -o jsonpath='{range .items[?(@.spec.taskRef.name=="echo-task")]}{.metadata.name}{"\n"}{end}' \
            2>/dev/null | grep -c . || echo "0")
          if [ "$COUNT" -lt "1" ]; then
            echo "ERROR: No TaskRun found referencing echo-task"
            exit 1
          fi
          echo "TaskRun for echo-task found ($COUNT total)"

  cleanup:
    - script:
        inline: |-
          #!/usr/bin/env bash
          kubectl delete taskrun --all -n tekton-eval --ignore-not-found=true 2>/dev/null || true
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: echo-task
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true

  prompt:
    inline: Start the Tekton Task named echo-task in the tekton-eval namespace.
