kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "create-tekton-task"
  difficulty: easy
  labels:
    suite: tekton
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true
    - script:
        inline: |-
          #!/usr/bin/env bash
          for i in $(seq 1 60); do
            if ! kubectl get namespace tekton-eval > /dev/null 2>&1; then
              echo "Namespace tekton-eval is gone"
              exit 0
            fi
            for tr in $(kubectl get taskrun -n tekton-eval -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl patch taskrun -n tekton-eval "$tr" --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
            done
            for pr in $(kubectl get pipelinerun -n tekton-eval -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl patch pipelinerun -n tekton-eval "$pr" --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
            done
            sleep 3
          done
          echo "Timeout waiting for namespace deletion"
          exit 1
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          if ! kubectl get task echo-task -n tekton-eval > /dev/null 2>&1; then
            echo "ERROR: Task echo-task not found in tekton-eval"
            exit 1
          fi
          echo "Task echo-task created successfully"
    - llmJudge:
        contains: "echo-task"

  cleanup:
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: echo-task
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true

  prompt:
    inline: |-
      Create a Tekton Task named "echo-task" in the tekton-eval namespace.
      The task should have a single step named "echo" that uses the alpine image and runs the command: echo hello-tekton
