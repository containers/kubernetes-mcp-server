kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "restart-tekton-pipelinerun"
  difficulty: medium
  labels:
    suite: tekton
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true
    - script:
        inline: |-
          #!/usr/bin/env bash
          for i in $(seq 1 60); do
            if ! kubectl get namespace tekton-eval > /dev/null 2>&1; then
              echo "Namespace tekton-eval is gone"
              exit 0
            fi
            for tr in $(kubectl get taskrun -n tekton-eval -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl patch taskrun -n tekton-eval "$tr" --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
            done
            for pr in $(kubectl get pipelinerun -n tekton-eval -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              kubectl patch pipelinerun -n tekton-eval "$pr" --type=json -p='[{"op":"remove","path":"/metadata/finalizers"}]' 2>/dev/null || true
            done
            sleep 3
          done
          echo "Timeout waiting for namespace deletion"
          exit 1
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: noop-task
          namespace: tekton-eval
        spec:
          steps:
            - name: noop
              image: alpine
              command: ["echo", "noop"]
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: Pipeline
        metadata:
          name: hello-pipeline
          namespace: tekton-eval
        spec:
          tasks:
            - name: noop
              taskRef:
                name: noop-task
    - k8s.create:
        apiVersion: tekton.dev/v1
        kind: PipelineRun
        metadata:
          name: test-run
          namespace: tekton-eval
        spec:
          pipelineRef:
            name: hello-pipeline

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          # After restart a new PipelineRun should have been created (total >= 2)
          COUNT=$(kubectl get pipelinerun -n tekton-eval --no-headers 2>/dev/null | wc -l)
          if [ "$COUNT" -lt "2" ]; then
            echo "ERROR: Expected at least 2 PipelineRuns after restart, found $COUNT"
            exit 1
          fi
          echo "Restart created a new PipelineRun ($COUNT total in namespace)"

  cleanup:
    - script:
        inline: |-
          #!/usr/bin/env bash
          kubectl delete pipelinerun --all -n tekton-eval --ignore-not-found=true 2>/dev/null || true
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Pipeline
        metadata:
          name: hello-pipeline
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: tekton.dev/v1
        kind: Task
        metadata:
          name: noop-task
          namespace: tekton-eval
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: tekton-eval
        ignoreNotFound: true

  prompt:
    inline: Restart the Tekton PipelineRun named test-run in the tekton-eval namespace.
