kind: Task
metadata:
  labels:
    suite: kubevirt
    requires: kubevirt
  name: "diagnose-vm-network"
  difficulty: medium
  description: "Use vm_guest_info to diagnose network connectivity issues by finding the actual IP addresses assigned inside the VM"
steps:
  setup:
    inline: |-
      #!/usr/bin/env bash
      set -e
      NS="${EVAL_NAMESPACE:-vm-test}"
      kubectl delete namespace "$NS" --ignore-not-found
      kubectl create namespace "$NS"

      # Create a VM with guest agent that has network interfaces
      kubectl apply -f - <<EOF
      apiVersion: kubevirt.io/v1
      kind: VirtualMachine
      metadata:
        name: web-server
        namespace: $NS
      spec:
        runStrategy: Always
        template:
          spec:
            domain:
              devices:
                disks:
                - name: containerdisk
                  disk:
                    bus: virtio
                - name: cloudinitdisk
                  disk:
                    bus: virtio
              resources:
                requests:
                  memory: 2Gi
            volumes:
            - name: containerdisk
              containerDisk:
                image: quay.io/containerdisks/fedora:latest
            - name: cloudinitdisk
              cloudInitNoCloud:
                userData: |
                  #cloud-config
                  password: fedora
                  chpasswd: { expire: False }
                  packages:
                    - qemu-guest-agent
                  runcmd:
                    - systemctl enable qemu-guest-agent
                    - systemctl start qemu-guest-agent
      EOF

      kubectl wait --for=create vm/web-server -n "${NS}" --timeout=30s
      echo "VM created. In a real scenario, the guest agent will provide network info."
  verify:
    inline: |-
      #!/usr/bin/env bash
      set -e
      NS="${EVAL_NAMESPACE:-vm-test}"

      echo "=== Verification: Network Diagnosis ==="

      # The agent should have used vm_guest_info to get network information
      # We can't verify the exact data without a real KubeVirt cluster,
      # but we verify the VM exists and is running

      if ! kubectl get vmi web-server -n "$NS" &>/dev/null; then
        echo "✗ VirtualMachineInstance 'web-server' not found"
        echo "ℹ In a real cluster, vm_guest_info would show network interfaces and IP addresses"
        exit 0
      fi

      PHASE=$(kubectl get vmi web-server -n "$NS" -o jsonpath='{.status.phase}')
      if [ "$PHASE" == "Running" ]; then
        echo "✓ VM is running - guest agent info would be available"
      else
        echo "ℹ VM phase: $PHASE - guest agent info requires Running state"
      fi

      echo ""
      echo "=== Expected Agent Actions ==="
      echo "The agent should have:"
      echo "  1. Used: vm_guest_info namespace=$NS name=web-server info_type=network"
      echo "  2. Identified the VM's network interfaces and IP addresses"
      echo "  3. Reported findings like:"
      echo "     - Interface: eth0, IP: 10.244.0.5"
      echo "     - Interface: lo, IP: 127.0.0.1"
      echo "  4. Provided the internal IP for network troubleshooting"
      echo ""
      echo "✓ Network diagnosis eval complete"
      exit 0
  cleanup:
    inline: |-
      #!/usr/bin/env bash
      NS="${EVAL_NAMESPACE:-vm-test}"
      kubectl delete virtualmachine web-server -n "$NS" --ignore-not-found
      kubectl delete namespace "$NS" --ignore-not-found
  prompt:
    inline: |
      A user reports that they cannot connect to the web server running inside the VirtualMachine named "web-server" in the ${EVAL_NAMESPACE:-vm-test} namespace.

      The VM appears to be running, but they don't know what IP address was assigned to it inside the guest OS.

      Please help diagnose this network issue by:
      1. Getting the network configuration from inside the VM
      2. Identifying all network interfaces and their IP addresses
      3. Reporting which IP address the user should try to connect to

      Note: Use the appropriate tool to get information from inside the running VM without requiring SSH access.
