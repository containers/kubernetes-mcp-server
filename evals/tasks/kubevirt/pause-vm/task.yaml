kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: kubevirt
    requires: kubevirt
  name: "pause-vm"
  difficulty: medium
spec:
  requires:
    - extension: kubernetes
      as: k8s
  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: vm-test-pause
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: vm-test-pause
    - k8s.create:
        apiVersion: kubevirt.io/v1
        kind: VirtualMachine
        metadata:
          name: paused-vm
          namespace: vm-test-pause
        spec:
          runStrategy: Always
          template:
            spec:
              domain:
                devices:
                  disks:
                    - name: containerdisk
                      disk:
                        bus: virtio
                memory:
                  guest: 2Gi
              terminationGracePeriodSeconds: 0
              volumes:
                - name: containerdisk
                  containerDisk:
                    image: quay.io/containerdisks/fedora:latest
    - k8s.wait:
        apiVersion: kubevirt.io/v1
        kind: VirtualMachine
        metadata:
          name: paused-vm
          namespace: vm-test-pause
        condition: Ready
        timeout: 120s
  verify:
    - k8s.wait:
        apiVersion: kubevirt.io/v1
        kind: VirtualMachine
        metadata:
          name: paused-vm
          namespace: vm-test-pause
        condition: Paused
        timeout: 5s
  cleanup:
    - k8s.delete:
        apiVersion: kubevirt.io/v1
        kind: VirtualMachine
        metadata:
          name: paused-vm
          namespace: vm-test-pause
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: vm-test-pause
        ignoreNotFound: true
  prompt:
    inline: |
      Please pause the virtual machine named paused-vm in the vm-test-pause namespace.
