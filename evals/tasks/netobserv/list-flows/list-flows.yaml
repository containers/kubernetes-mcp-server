kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  labels:
    suite: netobserv
    requires: netobserv
  name: "List flows in default namespace"
  category: "Flow inspection"
  description: "Retrieves recent flow records for the default namespace."
  difficulty: easy
spec:
  requires:
    - extension: kubernetes
      as: k8s
  setup:
    - script:
        file: ../shared/setup-mock.sh
        timeout: 180s
  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -euo pipefail
          curl -sf "http://127.0.0.1:9001/api/loki/flow/records?namespace=default&timeRange=300" | grep -q eval-flow-1
    - llmJudge:
        contains: "eval-flow-1"
  prompt:
    inline: "A teammate asked what network traffic the default namespace has seen in the last 5 minutes. Use NetObserv to investigate and summarize the flows you find, including any flow names or counts."
