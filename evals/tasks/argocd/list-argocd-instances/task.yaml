kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "list-argocd-instances"
  difficulty: easy
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-list-inst
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-list-inst
    - k8s.create:
        apiVersion: argoproj.io/v1beta1
        kind: ArgoCD
        metadata:
          name: argocd-main
          namespace: argocd-eval-list-inst
        spec:
          server:
            route:
              enabled: false
    - k8s.create:
        apiVersion: argoproj.io/v1beta1
        kind: ArgoCD
        metadata:
          name: argocd-staging
          namespace: argocd-eval-list-inst
        spec:
          server:
            route:
              enabled: false

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          COUNT=$(kubectl get argocd -n argocd-eval-list-inst --no-headers 2>/dev/null | wc -l)
          if [ "$COUNT" -lt "2" ]; then
            echo "ERROR: Expected at least 2 ArgoCD instances, found $COUNT"
            exit 1
          fi
          echo "Found $COUNT ArgoCD instances in argocd-eval-list-inst"
    - llmJudge:
        contains: "argocd-main"
    - llmJudge:
        contains: "argocd-staging"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1beta1
        kind: ArgoCD
        metadata:
          name: argocd-main
          namespace: argocd-eval-list-inst
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: argoproj.io/v1beta1
        kind: ArgoCD
        metadata:
          name: argocd-staging
          namespace: argocd-eval-list-inst
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-list-inst
        ignoreNotFound: true

  prompt:
    inline: List all ArgoCD instances in the argocd-eval-list-inst namespace.
