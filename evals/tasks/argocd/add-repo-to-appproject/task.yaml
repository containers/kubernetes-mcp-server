kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "add-repo-to-argocd-appproject"
  difficulty: medium
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-add-repo
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-add-repo
    - k8s.create:
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: team-platform
          namespace: argocd-eval-add-repo
        spec:
          description: Platform team project
          sourceRepos:
            - https://github.com/team-platform/infra
          destinations:
            - server: https://kubernetes.default.svc
              namespace: platform

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          REPOS=$(kubectl get appproject team-platform -n argocd-eval-add-repo -o jsonpath='{.spec.sourceRepos}')
          echo "$REPOS" | grep -q "https://github.com/team-platform/infra" || { echo "ERROR: Original repo missing"; exit 1; }
          echo "$REPOS" | grep -q "https://github.com/new-team/services" || { echo "ERROR: New repo not added"; exit 1; }
          echo "AppProject team-platform has both source repos"
    - llmJudge:
        contains: "new-team/services"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: team-platform
          namespace: argocd-eval-add-repo
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-add-repo
        ignoreNotFound: true

  prompt:
    inline: Add 'https://github.com/new-team/services' to the allowed source repos of the ArgoCD AppProject (apiVersion argoproj.io/v1alpha1) named 'team-platform' in namespace 'argocd-eval-add-repo'. Keep the existing source repos intact.
