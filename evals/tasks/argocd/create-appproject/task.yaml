kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "create-argocd-appproject"
  difficulty: medium
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-proj
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-proj

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          kubectl get appproject team-alpha -n argocd-eval-create-proj -o jsonpath='{.spec.sourceRepos[0]}' | grep -q "https://github.com/team-alpha" || exit 1
          DEST_NS=$(kubectl get appproject team-alpha -n argocd-eval-create-proj -o jsonpath='{.spec.destinations[0].namespace}')
          if [ "$DEST_NS" != "alpha-ns" ]; then
            echo "ERROR: Expected destination namespace alpha-ns, got $DEST_NS"
            exit 1
          fi
          echo "AppProject team-alpha created with correct permissions"
    - llmJudge:
        contains: "team-alpha"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: team-alpha
          namespace: argocd-eval-create-proj
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-proj
        ignoreNotFound: true

  prompt:
    inline: Create an ArgoCD AppProject (apiVersion argoproj.io/v1alpha1) named 'team-alpha' in namespace 'argocd-eval-create-proj'. Configure it with sourceRepos allowing 'https://github.com/team-alpha/*' and a destination allowing server 'https://kubernetes.default.svc' and namespace 'alpha-ns'.
