kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "update-argocd-app-revision"
  difficulty: medium
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-upd-rev
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-upd-rev
    - k8s.create:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: my-app
          namespace: argocd-eval-upd-rev
        spec:
          project: default
          source:
            repoURL: https://github.com/example/app
            targetRevision: HEAD
            path: manifests
          destination:
            server: https://kubernetes.default.svc
            namespace: default

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          REV=$(kubectl get application my-app -n argocd-eval-upd-rev -o jsonpath='{.spec.source.targetRevision}')
          if [ "$REV" != "v2.0.0" ]; then
            echo "ERROR: targetRevision is '$REV', expected 'v2.0.0'"
            exit 1
          fi
          echo "Application my-app targetRevision updated to v2.0.0"
    - llmJudge:
        contains: "v2.0.0"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: my-app
          namespace: argocd-eval-upd-rev
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-upd-rev
        ignoreNotFound: true

  prompt:
    inline: Update the ArgoCD Application (apiVersion argoproj.io/v1alpha1) named 'my-app' in namespace 'argocd-eval-upd-rev' to target revision 'v2.0.0' instead of its current target revision.
