kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "create-argocd-applicationset"
  difficulty: medium
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-appset
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-appset

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          kubectl get applicationset env-apps -n argocd-eval-create-appset -o name || { echo "ERROR: ApplicationSet not found"; exit 1; }
          ELEMENTS=$(kubectl get applicationset env-apps -n argocd-eval-create-appset -o jsonpath='{.spec.generators[0].list.elements}')
          for ENV in dev staging prod; do
            echo "$ELEMENTS" | grep -q "$ENV" || { echo "ERROR: Environment $ENV not found in list generator"; exit 1; }
          done
          echo "ApplicationSet env-apps created with dev, staging, prod environments"
    - llmJudge:
        contains: "env-apps"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: ApplicationSet
        metadata:
          name: env-apps
          namespace: argocd-eval-create-appset
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-appset
        ignoreNotFound: true

  prompt:
    inline: Create an ArgoCD ApplicationSet (apiVersion argoproj.io/v1alpha1) named 'env-apps' in namespace 'argocd-eval-create-appset'. Use a list generator with three environments (dev, staging, prod). Each generated Application should use repo 'https://github.com/company/app', path 'deploy', project 'default', and deploy to a namespace matching the environment name on server 'https://kubernetes.default.svc'.
