kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "restrict-wildcard-argocd-appproject"
  difficulty: hard
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-restrict
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-restrict
    - k8s.create:
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: too-open
          namespace: argocd-eval-restrict
        spec:
          description: Overly permissive project
          sourceRepos:
            - '*'
          destinations:
            - server: '*'
              namespace: '*'

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          REPOS=$(kubectl get appproject too-open -n argocd-eval-restrict -o jsonpath='{.spec.sourceRepos}')
          if echo "$REPOS" | grep -q '"\*"'; then
            echo "ERROR: Wildcard still present in sourceRepos"
            exit 1
          fi
          echo "$REPOS" | grep -q "https://github.com/company/app" || { echo "ERROR: Expected repo not found"; exit 1; }

          DEST_NS=$(kubectl get appproject too-open -n argocd-eval-restrict -o jsonpath='{.spec.destinations[0].namespace}')
          DEST_SRV=$(kubectl get appproject too-open -n argocd-eval-restrict -o jsonpath='{.spec.destinations[0].server}')
          if [ "$DEST_NS" = "*" ] || [ "$DEST_SRV" = "*" ]; then
            echo "ERROR: Wildcard still present in destinations"
            exit 1
          fi
          if [ "$DEST_NS" != "app-ns" ]; then
            echo "ERROR: Expected destination namespace 'app-ns', got '$DEST_NS'"
            exit 1
          fi
          echo "AppProject too-open restricted: wildcards removed, specific entries set"
    - llmJudge:
        contains: "github.com/company/app"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: too-open
          namespace: argocd-eval-restrict
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-restrict
        ignoreNotFound: true

  prompt:
    inline: The ArgoCD AppProject (apiVersion argoproj.io/v1alpha1) named 'too-open' in namespace 'argocd-eval-restrict' has wildcard permissions for both source repos and destinations. Restrict it to only allow source repo 'https://github.com/company/app' and destination namespace 'app-ns' on server 'https://kubernetes.default.svc'. Remove all wildcard entries.
