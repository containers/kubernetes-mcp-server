kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "fix-argocd-missing-project"
  difficulty: hard
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-fix-proj
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-fix-proj
    - k8s.create:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: misconfigured-app
          namespace: argocd-eval-fix-proj
        spec:
          project: team-ghost
          source:
            repoURL: https://github.com/team-ghost/frontend
            targetRevision: main
            path: deploy
          destination:
            server: https://kubernetes.default.svc
            namespace: ghost-ns

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          kubectl get appproject team-ghost -n argocd-eval-fix-proj -o name || { echo "ERROR: AppProject team-ghost not created"; exit 1; }
          REPOS=$(kubectl get appproject team-ghost -n argocd-eval-fix-proj -o jsonpath='{.spec.sourceRepos}')
          echo "$REPOS" | grep -q "github.com/team-ghost" || { echo "ERROR: sourceRepos does not match application source"; exit 1; }
          DEST_NS=$(kubectl get appproject team-ghost -n argocd-eval-fix-proj -o jsonpath='{.spec.destinations[0].namespace}')
          if [ "$DEST_NS" != "ghost-ns" ]; then
            echo "ERROR: destination namespace '$DEST_NS' does not match application destination 'ghost-ns'"
            exit 1
          fi
          echo "AppProject team-ghost created with matching source/destination config"
    - llmJudge:
        contains: "team-ghost"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: misconfigured-app
          namespace: argocd-eval-fix-proj
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: team-ghost
          namespace: argocd-eval-fix-proj
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-fix-proj
        ignoreNotFound: true

  prompt:
    inline: The ArgoCD Application (apiVersion argoproj.io/v1alpha1) named 'misconfigured-app' in namespace 'argocd-eval-fix-proj' references a project that does not exist. Investigate the application to find which project it references, then create the missing AppProject (apiVersion argoproj.io/v1alpha1) with sourceRepos and destinations matching what the application needs.
