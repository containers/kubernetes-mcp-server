kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "create-argocd-app-with-project"
  difficulty: medium
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-app-proj
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-app-proj

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          kubectl get appproject team-web -n argocd-eval-app-proj -o name || { echo "ERROR: AppProject team-web not found"; exit 1; }
          kubectl get application web-frontend -n argocd-eval-app-proj -o name || { echo "ERROR: Application web-frontend not found"; exit 1; }
          PROJECT=$(kubectl get application web-frontend -n argocd-eval-app-proj -o jsonpath='{.spec.project}')
          if [ "$PROJECT" != "team-web" ]; then
            echo "ERROR: Application project is '$PROJECT', expected 'team-web'"
            exit 1
          fi
          echo "AppProject team-web and Application web-frontend created and linked"
    - llmJudge:
        contains: "team-web"
    - llmJudge:
        contains: "web-frontend"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: web-frontend
          namespace: argocd-eval-app-proj
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: team-web
          namespace: argocd-eval-app-proj
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-app-proj
        ignoreNotFound: true

  prompt:
    inline: In namespace 'argocd-eval-app-proj', create an ArgoCD AppProject (apiVersion argoproj.io/v1alpha1) named 'team-web' allowing source repo 'https://github.com/team-web/app' and destination namespace 'web' on server 'https://kubernetes.default.svc'. Then create an ArgoCD Application (apiVersion argoproj.io/v1alpha1) named 'web-frontend' in that project, pointing to repo 'https://github.com/team-web/app', path 'deploy', targeting namespace 'web'.
