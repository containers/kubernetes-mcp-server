kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "create-argocd-application"
  difficulty: easy
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-app
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-app

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          kubectl get application my-app -n argocd-eval-create-app -o jsonpath='{.spec.source.repoURL}' | grep -q "https://github.com/example/app" || exit 1
          kubectl get application my-app -n argocd-eval-create-app -o jsonpath='{.spec.source.path}' | grep -q "manifests" || exit 1
          kubectl get application my-app -n argocd-eval-create-app -o jsonpath='{.spec.destination.namespace}' | grep -q "default" || exit 1
          echo "Application my-app created with correct spec"
    - llmJudge:
        contains: "my-app"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: my-app
          namespace: argocd-eval-create-app
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-app
        ignoreNotFound: true

  prompt:
    inline: Create an ArgoCD Application (apiVersion argoproj.io/v1alpha1) named 'my-app' in namespace 'argocd-eval-create-app'. It should point to repo 'https://github.com/example/app', path 'manifests', project 'default', and target the 'default' namespace on server 'https://kubernetes.default.svc'.
