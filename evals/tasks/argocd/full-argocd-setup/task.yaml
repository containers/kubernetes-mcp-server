kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "full-argocd-environment-setup"
  difficulty: hard
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-full-setup
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-full-setup

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          kubectl get argocd argocd-team-x -n argocd-eval-full-setup -o name || { echo "ERROR: ArgoCD instance not found"; exit 1; }
          kubectl get appproject team-x-project -n argocd-eval-full-setup -o name || { echo "ERROR: AppProject not found"; exit 1; }
          kubectl get application team-x-api -n argocd-eval-full-setup -o name || { echo "ERROR: Application not found"; exit 1; }

          PROJECT=$(kubectl get application team-x-api -n argocd-eval-full-setup -o jsonpath='{.spec.project}')
          if [ "$PROJECT" != "team-x-project" ]; then
            echo "ERROR: Application project is '$PROJECT', expected 'team-x-project'"
            exit 1
          fi

          REPO=$(kubectl get application team-x-api -n argocd-eval-full-setup -o jsonpath='{.spec.source.repoURL}')
          echo "$REPO" | grep -q "github.com/team-x/apps" || { echo "ERROR: Application repo doesn't match"; exit 1; }

          PROJ_REPOS=$(kubectl get appproject team-x-project -n argocd-eval-full-setup -o jsonpath='{.spec.sourceRepos}')
          echo "$PROJ_REPOS" | grep -q "github.com/team-x/apps" || { echo "ERROR: AppProject sourceRepos doesn't include app repo"; exit 1; }

          echo "Full ArgoCD environment created: instance + project + application correctly wired"
    - llmJudge:
        contains: "argocd-team-x"
    - llmJudge:
        contains: "team-x-project"
    - llmJudge:
        contains: "team-x-api"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: team-x-api
          namespace: argocd-eval-full-setup
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: AppProject
        metadata:
          name: team-x-project
          namespace: argocd-eval-full-setup
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: argoproj.io/v1beta1
        kind: ArgoCD
        metadata:
          name: argocd-team-x
          namespace: argocd-eval-full-setup
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-full-setup
        ignoreNotFound: true

  prompt:
    inline: Set up a complete ArgoCD environment in namespace 'argocd-eval-full-setup'. Create all three resources - an ArgoCD instance (apiVersion argoproj.io/v1beta1, kind ArgoCD) named 'argocd-team-x', an AppProject (apiVersion argoproj.io/v1alpha1) named 'team-x-project' allowing source repo 'https://github.com/team-x/apps' and destination namespace 'team-x' on server 'https://kubernetes.default.svc', and an Application (apiVersion argoproj.io/v1alpha1) named 'team-x-api' in project 'team-x-project' pointing to repo 'https://github.com/team-x/apps' path 'api/' targeting namespace 'team-x'.
