kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "cleanup-deprecated-argocd-apps"
  difficulty: medium
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-cleanup
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-cleanup
    - k8s.create:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: app-active-1
          namespace: argocd-eval-cleanup
          labels:
            status: active
        spec:
          project: default
          source:
            repoURL: https://github.com/company/active1
            targetRevision: HEAD
            path: deploy
          destination:
            server: https://kubernetes.default.svc
            namespace: default
    - k8s.create:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: app-active-2
          namespace: argocd-eval-cleanup
          labels:
            status: active
        spec:
          project: default
          source:
            repoURL: https://github.com/company/active2
            targetRevision: HEAD
            path: deploy
          destination:
            server: https://kubernetes.default.svc
            namespace: default
    - k8s.create:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: app-deprecated-1
          namespace: argocd-eval-cleanup
          labels:
            status: deprecated
        spec:
          project: default
          source:
            repoURL: https://github.com/company/old1
            targetRevision: HEAD
            path: deploy
          destination:
            server: https://kubernetes.default.svc
            namespace: default
    - k8s.create:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: app-deprecated-2
          namespace: argocd-eval-cleanup
          labels:
            status: deprecated
        spec:
          project: default
          source:
            repoURL: https://github.com/company/old2
            targetRevision: HEAD
            path: deploy
          destination:
            server: https://kubernetes.default.svc
            namespace: default

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          if kubectl get application app-deprecated-1 -n argocd-eval-cleanup 2>/dev/null; then
            echo "ERROR: app-deprecated-1 still exists"
            exit 1
          fi
          if kubectl get application app-deprecated-2 -n argocd-eval-cleanup 2>/dev/null; then
            echo "ERROR: app-deprecated-2 still exists"
            exit 1
          fi
          kubectl get application app-active-1 -n argocd-eval-cleanup -o name || { echo "ERROR: app-active-1 was deleted"; exit 1; }
          kubectl get application app-active-2 -n argocd-eval-cleanup -o name || { echo "ERROR: app-active-2 was deleted"; exit 1; }
          echo "Deprecated apps removed, active apps preserved"
    - llmJudge:
        contains: "deprecated"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: app-active-1
          namespace: argocd-eval-cleanup
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: app-active-2
          namespace: argocd-eval-cleanup
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: app-deprecated-1
          namespace: argocd-eval-cleanup
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: argoproj.io/v1alpha1
        kind: Application
        metadata:
          name: app-deprecated-2
          namespace: argocd-eval-cleanup
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-cleanup
        ignoreNotFound: true

  prompt:
    inline: Find and remove all ArgoCD Applications (apiVersion argoproj.io/v1alpha1) labeled 'status=deprecated' in namespace 'argocd-eval-cleanup'. Do not delete applications with other status labels. Report which applications were removed.
