kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "create-argocd-instance"
  difficulty: medium
  labels:
    suite: argocd
    requires: argocd
spec:
  requires:
    - extension: kubernetes
      as: k8s

  setup:
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-inst
        ignoreNotFound: true
    - k8s.create:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-inst

  verify:
    - script:
        inline: |-
          #!/usr/bin/env bash
          set -e
          kubectl get argocd argocd-dev -n argocd-eval-create-inst -o name || { echo "ERROR: ArgoCD instance not found"; exit 1; }
          ROUTE=$(kubectl get argocd argocd-dev -n argocd-eval-create-inst -o jsonpath='{.spec.server.route}')
          if [ -z "$ROUTE" ]; then
            echo "ERROR: spec.server.route not configured"
            exit 1
          fi
          echo "ArgoCD instance argocd-dev created with server route"
    - llmJudge:
        contains: "argocd-dev"

  cleanup:
    - k8s.delete:
        apiVersion: argoproj.io/v1beta1
        kind: ArgoCD
        metadata:
          name: argocd-dev
          namespace: argocd-eval-create-inst
        ignoreNotFound: true
    - k8s.delete:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: argocd-eval-create-inst
        ignoreNotFound: true

  prompt:
    inline: Create an ArgoCD instance (apiVersion argoproj.io/v1beta1, kind ArgoCD) named 'argocd-dev' in namespace 'argocd-eval-create-inst' with server route enabled.
